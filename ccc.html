<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Attendance System</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body {
  font-family: Courier;
  background-image: url("logo5.jpg");
  margin: 0;
  text-align: center;
  background-size: 75vh;
}

#scanMessage { font-weight: bold; margin: 10px; font-size: 18px; }
.success { color: green; }
.error { color: red; }

#reader {
  width: 300px;
  height: 300px; /* important sa iOS */
  margin: auto;
  background: #eee;
  border-radius: 10px;
  overflow: hidden;
}

table {
  margin: 20px auto;
  width: 90%;
  border-collapse: collapse;
  background: white;
}

th { background: #5482e6; color: white; padding: 10px; }
td { border: 1px solid #ddd; padding: 8px; }

.present { background: #2ECC71; color: #166534; font-weight: bold; }
.late { background: darkgoldenrod; color: yellow; font-weight: bold; }
.absent { background: #fecaca; color: #7f1d1d; font-weight: bold; }

button {
  padding: 10px 20px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  margin: 5px;
  cursor: pointer;
}

.logout { background: red; }

/* Modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-content {
  background: white;
  padding: 2rem;
  border-radius: 8px;
  text-align: center;
  width: 250px;
}
.modal-btn-group {
  display: flex;
  gap: 1rem;
  margin-top: 1.5rem;
}
.modal-btn-group button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  font-size: 1rem;
}
.confirm-logout-btn { background: red; color: white; }
.confirm-logout-btn:hover { background-color: #c82333; }
.cancel-logout-btn { background: green; color: white; }
.cancel-logout-btn:hover { background-color: gray; }
</style>
</head>
<body>

<h2>QR Attendance System (iOS-ready)</h2>

<button onclick="setMode('in')">🟢 Time In</button>
<button onclick="setMode('out')">🔵 Time Out</button>
<h3 id="modeLabel">Mode: Time In</h3>

<div id="scanMessage"></div>
<div id="reader"></div>

<table id="attendanceTable">
<tr>
  <th>Student Name</th>
  <th>Date</th>
  <th>Time In</th>
  <th>Time Out</th>
  <th>Status</th>
</tr>
</table>

<button onclick="markAllAbsent()">Mark Unscanned as Absent</button>
<button onclick="exportToCSV()">Export to CSV</button>

<div class="logout-container">
  <button onclick="showConfirmModal()">Log Out</button>
</div>

<div class="modal" id="logoutConfirmationModal">
  <div class="modal-content">
    <h3>Are you sure you want to log out?</h3>
    <div class="modal-btn-group">
      <form action="index.html" style="margin:0;flex:1;">
        <button type="submit" class="confirm-logout-btn">Yes, Log Out</button>
      </form>
      <button class="cancel-logout-btn" onclick="hideConfirmModal()">No, Stay Logged In</button>
    </div>
  </div>
</div>

<script>
let mode="in";
let scanLocked=false;
let scanDelay=5000;

function setMode(m){
  mode=m;
  document.getElementById("modeLabel").innerText=
    mode==="in"?"Mode: Time In":"Mode: Time Out";
}

function beep(freq,duration){
  let ctx=new(window.AudioContext||window.webkitAudioContext)();
  let o=ctx.createOscillator();
  o.frequency.value=freq;
  o.connect(ctx.destination);
  o.start();
  setTimeout(()=>o.stop(),duration);
}

function beepSuccess(){ beep(900,150); }
function beepError(){ beep(400,200); }

function todayKey(){
  let d=new Date();
  return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function loadAttendance(){
  let savedDate=localStorage.getItem("attendance_date");
  let today=todayKey();
  if(savedDate!==today){
    localStorage.removeItem("attendance_data");
    localStorage.setItem("attendance_date",today);
  }
  let data=localStorage.getItem("attendance_data");
  if(data) document.getElementById("attendanceTable").innerHTML=data;
}

function saveAttendance(){
  localStorage.setItem("attendance_data",
    document.getElementById("attendanceTable").innerHTML);
}

const students={
  "104971140002": { name: "Amoranto Jaz Chine Kenth" },
  "158542150101": { name: "Angel Geliane Q." },
  "136473150058": { name: "Arago Chris Justin P." },
  "158528140092": { name: "Ardenia Joshua D." },
  "136792140419": { name: "Argente Jayson A." },
  "136858140676": { name: "Cajes Vincent T." }
  // Add more students as needed
};

function getStatus(now){
  let presentCutoff=new Date();
  presentCutoff.setHours(6,30,0,0);
  let absentCutoff=new Date();
  absentCutoff.setHours(12,0,0,0);
  if(now<=presentCutoff) return "Present";
  if(now<absentCutoff) return "Late";
  return "Absent";
}

function onScanSuccess(decodedText){
  if(scanLocked) return;
  scanLocked=true;

  let msg=document.getElementById("scanMessage");
  let table=document.getElementById("attendanceTable");
  let student=students[decodedText];
  if(!student){
    msg.innerText="❌ Unknown QR";
    msg.className="error";
    beepError();
    unlock(); return;
  }

  let name=student.name;
  let now=new Date();
  let dateStr=now.toLocaleDateString();
  let timeStr=now.toLocaleTimeString();

  for(let i=1;i<table.rows.length;i++){
    if(table.rows[i].cells[0].innerText===name){
      if(mode==="in"){ msg.innerText="⚠ Already Timed In"; beepError(); unlock(); return; }
      if(mode==="out"){
        if(table.rows[i].cells[3].innerText!==""){
          msg.innerText="⚠ Already Timed Out"; beepError(); unlock(); return;
        }
        table.rows[i].cells[3].innerText=timeStr;
        msg.innerText="⏰ Time Out Recorded"; beepSuccess();
        saveAttendance(); unlock(); return;
      }
    }
  }

  if(mode==="in"){
    let status=getStatus(now);
    let row=table.insertRow();
    row.insertCell(0).innerText=name;
    row.insertCell(1).innerText=dateStr;
    row.insertCell(2).innerText=timeStr;
    row.insertCell(3).innerText="";
    row.insertCell(4).innerText=status;
    row.cells[4].className=status.toLowerCase();
    msg.innerText="✅ Time In Success ("+status+")";
    beepSuccess();
    saveAttendance();
  } else {
    msg.innerText="⚠ Must Time In first";
    beepError();
  }
  unlock();
}

function unlock(){ setTimeout(()=>scanLocked=false,scanDelay); }

function markAllAbsent(){
  let table=document.getElementById("attendanceTable");
  let scanned=[...table.rows].slice(1).map(r=>r.cells[0].innerText);
  let now=new Date(); let dateStr=now.toLocaleDateString();
  for(let id in students){
    let name=students[id].name;
    if(!scanned.includes(name)){
      let row=table.insertRow();
      row.insertCell(0).innerText=name;
      row.insertCell(1).innerText=dateStr;
      row.insertCell(2).innerText="";
      row.insertCell(3).innerText="";
      row.insertCell(4).innerText="Absent";
      row.cells[4].className="absent";
    }
  }
  saveAttendance();
}

function exportToCSV(){
  let rows=[...document.querySelectorAll("#attendanceTable tr")];
  let csv=rows.map(r=>[...r.cells].map(c=>c.innerText).join(",")).join("\n");
  let blob=new Blob([csv]); let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="Attendance.csv"; a.click();
}

// Logout modal
function showConfirmModal(){ document.getElementById('logoutConfirmationModal').style.display='flex'; }
function hideConfirmModal(){ document.getElementById('logoutConfirmationModal').style.display='none'; }

// Initialize scanner after DOM loaded
document.addEventListener("DOMContentLoaded", function(){
  new Html5QrcodeScanner("reader", {
    fps:10, qrbox:250,
    experimentalFeatures:{useBarCodeDetectorIfSupported:true}
  }, false).render(onScanSuccess);
  loadAttendance();
});
</script>

</body>
</html>
